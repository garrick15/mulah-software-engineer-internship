<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CSV Table Processor</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
</head>
<body>

    <div class="container">
        <h1>CSV Data Processor</h1>
        
        <input type="file" id="csvFileInput" accept=".csv" />
        
        <div class="tables-wrapper">
            <section>
                <h2>Table 1 (Input Data)</h2>
                <div id="table1-container"></div>
            </section>

            <section>
                <h2>Table 2 (Processed Results)</h2>
                <table id="table2">
                    <thead>
                        <tr><th>Category</th><th>Value</th></tr>
                    </thead>
                    <tbody>
                        <tr><td>Alpha</td><td id="val-alpha">-</td></tr>
                        <tr><td>Beta</td><td id="val-beta">-</td></tr>
                        <tr><td>Charlie</td><td id="val-charlie">-</td></tr>
                    </tbody>
                </table>
            </section>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
